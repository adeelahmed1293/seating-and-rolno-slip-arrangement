<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;"/>
  <title>Login — Exam Seating Management System</title>
  <link rel="stylesheet" href="../../assets/css/globals.css"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar__app-name">Exam Seating Management System</span>
    <div class="titlebar__controls">
      <button class="titlebar__btn titlebar__btn--min"   id="btn-min"   title="Minimize"  aria-label="Minimize"></button>
      <button class="titlebar__btn titlebar__btn--max"   id="btn-max"   title="Maximize"  aria-label="Maximize"></button>
      <button class="titlebar__btn titlebar__btn--close" id="btn-close" title="Close"     aria-label="Close"></button>
    </div>
  </div>

  <!-- Main Split Layout -->
  <main class="login-layout">

    <!-- ══ LEFT: Brand Image Panel ══ -->
    <section class="panel panel--left" aria-hidden="true">
      <!-- animated grid overlay -->
      <div class="grid-overlay"></div>
      <!-- corner decorations -->
      <div class="corner corner--tl"></div>
      <div class="corner corner--br"></div>

      <div class="left-inner">
        <!-- The actual brand image -->
        <div class="logo-wrap">
          <img
            src="../../assets/images/logo.png"
            alt="Exam Seating Management System Logo"
            class="brand-img"
            draggable="false"
          />
        </div>

        <!-- BATs Dev badge -->
        <div class="bats-badge">
          <svg class="bat-icon" viewBox="0 0 80 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 8C40 8 32 2 20 4C12 6 6 12 4 16C8 14 14 15 18 18C14 16 10 18 8 22C12 20 18 20 22 24C18 22 16 26 18 30C22 26 28 24 32 26C34 24 36 20 36 16C38 18 40 22 40 22C40 22 42 18 44 16C44 20 46 24 48 26C52 24 58 26 62 30C64 26 62 22 58 24C62 20 68 20 72 22C70 18 66 16 62 18C66 15 72 14 76 16C74 12 68 6 60 4C48 2 40 8 40 8Z" fill="currentColor" opacity="0.6"/>
          </svg>
          <span>Developed by the <strong>BATs Dev</strong></span>
        </div>
      </div>
    </section>

    <!-- ══ RIGHT: Login Form ══ -->
    <section class="panel panel--right">
      <div class="form-card">

        <!-- Mini brand header -->
        <div class="form-brand">
          <div class="form-brand__dot"></div>
          <span class="form-brand__label">Admin Portal</span>
        </div>

        <h2 class="form-title">Sign In</h2>
        <p  class="form-subtitle">Exam Seating Management System</p>

        <!-- Alert -->
        <div class="alert" id="alert" role="alert" aria-live="polite" hidden>
          <svg class="alert__icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-9v4a1 1 0 11-2 0V9a1 1 0 112 0zm0-4a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd"/>
          </svg>
          <span id="alert-msg"></span>
        </div>

        <form class="login-form" id="loginForm" novalidate autocomplete="off">

          <!-- Username -->
          <div class="field-group">
            <label class="field-label" for="username">Username</label>
            <div class="field-wrap">
              <span class="field-icon field-icon--pre">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
              </span>
              <input
                class="field-input"
                type="text"
                id="username"
                placeholder="admin"
                autocomplete="off"
                spellcheck="false"
                aria-required="true"
              />
            </div>
            <span class="field-error" id="username-err" aria-live="polite"></span>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="field-wrap">
              <span class="field-icon field-icon--pre">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
              </span>
              <input
                class="field-input"
                type="password"
                id="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                aria-required="true"
              />
              <button class="field-icon field-icon--suf toggle-btn" type="button" id="togglePassword" aria-label="Toggle password visibility">
                <svg class="eye-show" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                <svg class="eye-hide" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.064 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>
              </button>
            </div>
            <span class="field-error" id="password-err" aria-live="polite"></span>
          </div>

          <!-- Submit -->
          <button class="btn-login" type="submit" id="loginBtn">
            <span class="btn-login__text">Sign In</span>
            <span class="btn-login__spinner" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10" stroke-opacity=".25"/>
                <path d="M12 2a10 10 0 0110 10"/>
              </svg>
            </span>
            <svg class="btn-login__arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
          </button>

        </form>

        <p class="form-footer">Authorized personnel only &bull; ESMS v1.0</p>

      </div>
    </section>

  </main>

  <script src="login.js"></script>
</body>
</html>
