<!-- attendance.html — Attendance Sheet page -->
<div class="pg-head">
  <div>
    <div class="pg-title">Attendance Sheets</div>
    <div class="pg-sub">Three views — preview & download separately</div>
  </div>
</div>

<!-- No plan placeholder -->
<div id="att-ph" style="display:none;flex-direction:column;align-items:center;justify-content:center;height:320px;gap:12px;color:var(--muted)">
  <div style="font-size:40px">📋</div>
  <div style="font-size:14px;font-weight:500">No seating plan generated yet</div>
  <div style="font-size:11px">Go to <strong>Generate Plan</strong> first</div>
  <button class="btn btn-p" onclick="nav('generate')" style="margin-top:6px">Go to Generate Plan →</button>
</div>

<div id="att-cnt" style="display:none">

  <!-- ── Download buttons ── -->
  <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px">

    <div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px">Download All Rooms</div>
    <div class="btn-row" style="margin-top:0;gap:8px">
      <button class="btn btn-ot" onclick="attDownloadColView()">⬇ Download Room-wise (Column View)</button>
      <button class="btn btn-ot" onclick="attDownloadClsView()">⬇ Download Room-wise (Class View)</button>
      <button class="btn btn-ot" onclick="attDownloadAllCW()">⬇ Download All Class-wise</button>
    </div>

    <div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-top:12px;margin-bottom:8px">Download Class-wise (one class at a time)</div>
    <div id="att-class-btns" class="btn-row" style="flex-wrap:wrap;gap:6px;margin-top:0"></div>

  </div>

  <!-- ── Preview tabs ── -->
  <div style="margin-bottom:10px">
    <div style="font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px">Preview</div>
    <div class="btn-row" style="margin-top:0;gap:6px;margin-bottom:10px">
      <button id="att-ptab-col" class="btn btn-p att-ptab" onclick="attSetPreview('col')">Room-wise (Column View)</button>
      <button id="att-ptab-cls" class="btn btn-ot att-ptab" onclick="attSetPreview('cls')">Room-wise (Class View)</button>
      <button id="att-ptab-cw"  class="btn btn-ot att-ptab" onclick="attSetPreview('cw')">Class-wise</button>
    </div>

    <!-- Room selector — hidden for class-wise -->
    <div id="att-room-sel">
      <div class="tabs" id="att-gtabs"></div>
      <div class="tabs" id="att-rtabs" style="margin-top:4px"></div>
    </div>
  </div>

  <!-- Preview area -->
  <div id="att-preview"></div>

</div>
